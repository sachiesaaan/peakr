# LUFS Lens - Configuration File
# Edit these values to customize analysis behavior.
# Delete or rename this file to revert to built-in defaults.

[Loudness]
TargetLUFS              = -9.0
LUFSTolerance           = 1.0
MaxTruePeak             = -0.1

[Audio]
# Comma-separated list of allowed sample rates (Hz)
AllowedSampleRates      = 44100,48000
# Comma-separated list of supported file extensions
SupportedExts           = .wav,.flac,.aif,.aiff,.mp3,.m4a
RecurseFolders          = true

[Stereo]
# Phase correlation below this triggers PHASE CANCEL (affects Status)
PhaseCancelThreshold    = 0.0
# Phase correlation below this triggers PHASE WARN (Issues only, not Status)
PhaseWarnThreshold      = 0.3
# L-R RMS difference (dB) above this triggers IMBALANCE (affects Status)
ImbalanceThreshold      = 1.5

[Debug]
WriteRawLoudnormDumpOnFailure = true
ShowDebugLines                = false
