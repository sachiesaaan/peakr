<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>peakr — loudness &amp; dynamics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="hdr">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
          <rect x="3"  y="14" width="4" height="11" rx="1"/>
          <rect x="10" y="8"  width="4" height="17" rx="1"/>
          <rect x="17" y="3"  width="4" height="22" rx="1"/>
          <line x1="0" y1="25.5" x2="28" y2="25.5" stroke-width="1"/>
        </svg>
      </span>
      <div class="brand-text">
        <h1>peakr<span class="brand-dot">.</span></h1>
        <div class="sub">Loudness &amp; dynamics analyzer<span class="sub-sep">/</span>know your levels</div>
      </div>
    </div>
    <div class="hdr-actions">
      <button id="btnExportCsv" class="btn" disabled>Export CSV</button>
      <button id="btnClear" class="btn ghost" disabled>Clear</button>
    </div>
  </div>

  <!-- Threshold controls -->
  <details class="threshold-panel" id="thresholdPanel">
    <summary>Thresholds</summary>
    <div class="threshold-grid">

      <div class="t-row">
        <label for="sTargetLUFS">Target LUFS</label>
        <input type="range"  id="sTargetLUFS"  min="-24" max="-6"  step="0.5" value="-9">
        <input type="number" id="nTargetLUFS"  min="-24" max="-6"  step="0.5" value="-9">
        <span class="unit">LUFS</span>
      </div>

      <div class="t-row">
        <label for="sLUFSTol">Tolerance ±</label>
        <input type="range"  id="sLUFSTol"     min="0"   max="3"   step="0.5" value="1">
        <input type="number" id="nLUFSTol"     min="0"   max="3"   step="0.5" value="1">
        <span class="unit">LU</span>
      </div>

      <div class="t-row">
        <label for="sMaxTP">Max True Peak</label>
        <input type="range"  id="sMaxTP"       min="-6"  max="0"   step="0.1" value="-0.1">
        <input type="number" id="nMaxTP"       min="-6"  max="0"   step="0.1" value="-0.1">
        <span class="unit">dBTP</span>
      </div>

      <div class="t-row">
        <label for="sPhaseCancel">Phase Cancel &lt;</label>
        <input type="range"  id="sPhaseCancel" min="-1"  max="1"   step="0.05" value="0">
        <input type="number" id="nPhaseCancel" min="-1"  max="1"   step="0.05" value="0">
        <span class="unit"></span>
      </div>

      <div class="t-row">
        <label for="sPhaseWarn">Phase Warn &lt;</label>
        <input type="range"  id="sPhaseWarn"   min="-1"  max="1"   step="0.05" value="0.3">
        <input type="number" id="nPhaseWarn"   min="-1"  max="1"   step="0.05" value="0.3">
        <span class="unit"></span>
      </div>

      <div class="t-row">
        <label for="sImbalance">Imbalance &gt;</label>
        <input type="range"  id="sImbalance"   min="0"   max="6"   step="0.5" value="1.5">
        <input type="number" id="nImbalance"   min="0"   max="6"   step="0.5" value="1.5">
        <span class="unit">dB</span>
      </div>

      <div class="t-row">
        <label for="nAllowedSR">Allowed SR</label>
        <input type="text" id="nAllowedSR" value="44100,48000" style="grid-column:span 2">
        <span class="unit">Hz</span>
      </div>

    </div>
  </details>

  <!-- Drop zone -->
  <div id="dropZone" class="drop-zone">
    <div class="drop-inner">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16V4m0 0L8 8m4-4 4 4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke-linecap="round"/>
      </svg>
      <p>Drop audio files here</p>
      <p class="drop-sub">WAV &middot; FLAC &middot; AIFF &middot; MP3 &middot; M4A</p>
      <button id="btnPick" class="btn">Browse files</button>
      <input type="file" id="filePicker"
             accept=".wav,.flac,.aif,.aiff,.mp3,.m4a"
             multiple hidden>
    </div>
    <div id="ffmpegStatus" class="ffmpeg-status">Loading FFmpeg WASM...</div>
  </div>

  <!-- Progress bar -->
  <div id="progressBar" class="progress-bar hidden">
    <div id="progressFill" class="progress-fill"></div>
  </div>

  <!-- Stats chips -->
  <div class="stats" id="statsArea" style="display:none"></div>

  <!-- Track cards -->
  <div class="tracks" id="tracksArea"></div>

  <!-- Legend -->
  <div class="legend" id="legendArea" style="display:none"></div>

  <!-- Footer -->
  <div class="footer">
    peakr &mdash; Audio loudness &amp; dynamics analysis.
  </div>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
